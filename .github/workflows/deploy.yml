name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build da imagem Docker (valida o Dockerfile de nuvem)
        run: docker build -f deploy/Dockerfile -t ants:latest .

      - name: Smoke test do container
        run: |
          docker run -d --rm -e PORT=8765 -p 8765:8765 --name ants ants:latest
          for i in $(seq 1 30); do
            curl -fsS http://localhost:8765/health && break || sleep 2
          done
          curl -fsS http://localhost:8765/health | grep -q '"status": "healthy"'
          docker stop ants

      - name: Disparar deploy no Render (opcional, se o secret existir)
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        if: ${{ env.HOOK != '' }}
        run: curl -fsS -X POST "$HOOK"
