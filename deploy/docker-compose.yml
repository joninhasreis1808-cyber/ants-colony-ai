# Ant's 6.0 — subir localmente com Docker (1 comando):
#   docker compose -f deploy/docker-compose.yml up --build
# Depois abra http://localhost:8765
services:
  ants:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8765:8765"
    environment:
      - PORT=8765
    restart: unless-stopped
