# Ant's 6.0 — Fly.io (deploy grátis).
# Troque "app" por um nome único: flyctl launch --copy-config --name SEU-NOME
app = "ants-colony"
primary_region = "gru"

[build]
  dockerfile = "deploy/Dockerfile"

[env]
  PORT = "8765"

[http_service]
  internal_port = 8765
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  path = "/health"
  interval = "30s"
  timeout = "5s"
  grace_period = "20s"
